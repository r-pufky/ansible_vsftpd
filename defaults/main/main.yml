---
# yamllint disable rule:line-length
###############################################################################
# Feature Flags
###############################################################################

# 1. Install application?
#
# Creates required default directories, users, install packages, update and
# start services. Configuration is always applied regardless of install option.
#
# Default: True.
#
vsftpd_flg_install: true

# 2. Harden VSFTPd Service?
#
# Applies systemd drop-in restricting VSFTPd to:
# * PrivateTmp=true
# * ProtectSystem=strict
# * ProtectHome=true
# * ProtectKernelTunables=true
# * ReadWritePaths=vsftpd_srv_harden_rw_paths
# * ReadOnlyPaths=vsftpd_srv_harden_ro_paths
# * InaccessiblePaths=vsftpd_srv_harden_inaccessible_paths
#
# Default: False.
#
# Reference:
# * https://wiki.archlinux.org/title/Very_Secure_FTP_Daemon
vsftpd_flg_harden: false

###############################################################################
# Service
###############################################################################

# User that VSFTPd will run under.
#
# 'ftp' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'ftp'.
vsftpd_srv_user: 'ftp'

# Group that VSFTPd will run under.
#
# 'ftp' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'ftp'.
vsftpd_srv_group: 'ftp'

# Secure configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use).
#
# Sets data in /etc/vsftpd.d/secure.conf.d/* with 0750:0640 root:root
# permissions. Secure material such as certs should be included here and
# sourced from config files. Files not sourced will be removed.
#
# vsftpd_srv_secure_d='' - Remove existing files.
# vsftpd_srv_secure_d='{DIR}' - Replace existing files with sourced template
#     dir.
#
# vsftpd_srv_secure_d: 'host_vars/ftp.example.com/secure.conf.d'
#
# Default: '' (disabled).
vsftpd_srv_secure_d: ''

# VSTPd user home directory permissions.
#
# Chroot environments require read-only root directories; otherwise logins
# result in:
#
#   500 OOPS: vsftpd: refusing to run with writable root inside chroot ()
#
# Chroot environments with the service local user must set user home directory
# read-only:
#
#   vsftpd_srv_home_mode: '0550'
#
# Ensure vsftpd_srv_local_root_recursive, vsftpd_srv_anon_root_recursive are
# not plowing directory permissions.
#
# Default: '0755'.
#
# Reference:
# * https://www.benscobie.com/fixing-500-oops-vsftpd-refusing-to-run-with-writable-root-inside-chroot/
vsftpd_srv_home_mode: '0755'

# Absolute paths to allow VSFTPd service to write to.
#
# Restricts service to only write to given paths. Include any custom paths
# defined in service configuration.
#
# Default:
#   - '{{ vsftpd_cfg_local_root }}'
#   - '{{ vsftpd_cfg_anon_root }}'
#   - '{{ vsftpd_cfg_vsftpd_log_file }}'
#   - '{{ vsftpd_cfg_xferlog_file }}'
#   - '/srv/ftp'  # service user home directory.
vsftpd_srv_harden_rw_paths:
  - '{{ vsftpd_cfg_local_root }}'
  - '{{ vsftpd_cfg_anon_root }}'
  - '{{ vsftpd_cfg_vsftpd_log_file }}'
  - '{{ vsftpd_cfg_xferlog_file }}'
  - '/srv/ftp'

# Absolute paths to allow VSFTPd service to read from.
#
# Restricts service to only read from given paths. Include any custom paths
# defined in service configuration. vsftpd_srv_harden_rw_paths takes
# precedence.
#
# Default: [] (disabled).
vsftpd_srv_harden_ro_paths: []

# Absolute paths to make inaccessible to VSFTPd.
#
# Useful for filtering out subpaths listed in vsftpd_srv_harden_rw_paths
# and vsftpd_srv_harden_ro_paths.
#
# Default: [] (disabled).
vsftpd_srv_harden_inaccessible_paths: []

# VSFTPd Local Root User Permissions
###############################################################################

# vsftpd_cfg_local_root directory user.
#
# Requires vsftpd_cfg_local_root to be set.
#
# Default: 'ftp'.
vsftpd_srv_local_root_user: 'ftp'

# vsftpd_cfg_local_root directory group.
#
# Requires vsftpd_cfg_local_root to be set.
#
# Default: 'ftp'.
vsftpd_srv_local_root_group: 'ftp'

# vsftpd_cfg_local_root directory mode.
#
# Requires vsftpd_cfg_local_root to be set.
#
# Default: '0770'.
vsftpd_srv_local_root_mode: '0770'

# Recursively set local root permissions?
#
# Options which use sub-directories (e.g. virtual users) are likely to be
# affected. Disabling will only set the root directory.
#
# Default: True.
vsftpd_srv_local_root_recursive: true

# VSFTPd Local Anonymous User Permissions
###############################################################################

# vsftpd_cfg_anon_root directory user.
#
# Requires vsftpd_cfg_anon_root to be set.
#
# Default: 'ftp'.
vsftpd_srv_anon_root_user: 'ftp'

# vsftpd_cfg_anon_root directory group.
#
# Requires vsftpd_cfg_anon_root to be set.
#
# Default: 'ftp'.
vsftpd_srv_anon_root_group: 'ftp'

# vsftpd_cfg_anon_root directory mode.
#
# Requires vsftpd_cfg_anon_root to be set.
#
# Default: '0770'.
vsftpd_srv_anon_root_mode: '0770'

# Recursively set anonymous root permissions?
#
# Options which use sub-directories (e.g. virtual users) are likely to be
# affected. Disabling will only set the root directory.
#
# Default: True.
vsftpd_srv_anon_root_recursive: true

###############################################################################
# Config
###############################################################################
# Role managed configuration options automatically setup and configure specific
# vsftpd.conf options to ensure deployment success. See config.yml for standard
# options.

# Virtual FTP users.
#
# Virtual users will be created automatically and have permissions from the
# vsftpd_cfg_guest_username account.
#
# Chroot environments require read-only root directories; otherwise logins
# result in:
#
#   500 OOPS: vsftpd: refusing to run with writable root inside chroot ()
#
# Check your configuration and set the backing user home directory read-only.
# See vsftpd_srv_local_root_mode, vsftpd_srv_anon_root_mode, and
# vsftpd_srv_home_mode. Ensure vsftpd_srv_local_root_recursive,
# vsftpd_srv_anon_root_recursive are not plowing directory permissions.
#
# Special Case:
#   * Forces vsftpd_cfg_guest_enable=true.
#   * Forces vsftpd_cfg_pam_service_name='vsftpd_virtual'.
#
# vsftpd_srv_virtual_users:
#       list of dict - virtual user names and passwords.
#     - user: str - username.
#       pass: str - password.
#
# Default: [] (disabled).
#
# Reference:
# * https://www.benscobie.com/fixing-500-oops-vsftpd-refusing-to-run-with-writable-root-inside-chroot/
vsftpd_srv_virtual_users: []

# Banned e-mails list.
#
# Requires vsftpd_cfg_deny_email_enable=true.
#
# List of email addresses (anonymous logins using email as passwords) which are
# not permitted. Automatically sets
# banned_email_file=/etc/vsftpd.d/banned_emails.
#
# vsftpd_srv_banned_emails:
#   - 'user1@example.com'
#   - 'user2@example.com'
#
# Default: [].
vsftpd_srv_banned_emails: []

# Login banner.
#
# Text to display when someone connects to the server. If set, it overrides the
# banner string provided by the vsftpd_cfg_ftpd_banner option. Automatically
# sets banner_file=/etc/vsftpd.d/banner.
#
# Default: ''.
vsftpd_srv_banner: ''

# Local user chroot list.
#
# Requires vsftpd_cfg_chroot_list_enable=true.
#
# List of local users which will be placed in a chroot() jail in their home
# directory. Automatically sets chroot_list_file=/etc/vsftpd.d/chroot_list.
#
# Special Case:
#   * vsftpd_cfg_chroot_local_user=true - list file becomes a list of users
#     to NOT place in a chroot() jail.
#
# Default: [].
vsftpd_srv_chroot_list: []

# List of email passwords.
#
# Requires vsftpd_cfg_secure_email_list_enable=true.
#
# Automatically sets email_password_file=/etc/vsftpd.d/email_passwords.
#
# Default: [].
vsftpd_srv_email_passwords: []

# Username list.
#
# Requires vsftpd_cfg_userlist_enable=true. Automatically sets
# userlist_file=/etc/vsftpd.d/user_list.
#
# Default: [].
vsftpd_srv_userlist: []

# VSFTPd per user session overrides.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use).
#
# Sets data in /etc/vsftpd.d/user.d/* with 0750:0640 root:root permissions.
# Files not sourced will be removed.
#
# These are static VSFTPd per-user config files. See 'man vsftpd.conf 5'.
# Allows the override of any config option specified in the manual page, on a
# per-user basis. For example, user "chris" logins in, VSFTPd will apply
# settings in /etc/vsftpd.d/user.d/chris for the duration of the session.
#
# PLEASE NOTE that not all settings are effective on a per-user basis. Examples
# of settings which will not affect any behavior on a per-user basis include
# vsftpd_cfg_listen_address, vsftpd_cfg_banner_file, vsftpd_cfg_max_per_ip,
# vsftpd_cfg_max_clients, vsftpd_cfg_xferlog_file, etc.
#
# VSFTPd will be automatically configured to use the installed location.
#
# vsftpd_srv_user_d='' - Remove existing files.
# vsftpd_srv_user_d='{DIR}' - Replace existing files with sourced template dir.
#
# vsftpd_srv_user_d: 'host_vars/ftp.example.com/user.d'
#
# Default: '' (disabled).
vsftpd_srv_user_d: ''
