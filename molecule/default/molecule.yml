---
###############################################################################
# Default
###############################################################################
# Default values results in running service.
#
# Tests:
# * Test local user setup and login success.
# * hardened service override works correctly (service running).
# * all remaining default options works correctly.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        vsftpd_flg_harden: true
        vsftpd_cfg_write_enable: true
        vsftpd_cfg_chroot_local_user: true
        vsftpd_cfg_chroot_list_enable: true
        vsftpd_srv_chroot_list:
          - 'test'
        vsftpd_cfg_ls_recurse_enable: true
platforms:
  - name: 'vsftpd-default'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
