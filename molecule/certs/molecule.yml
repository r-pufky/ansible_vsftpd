---
###############################################################################
# Certs
###############################################################################
# VSFTPd works with custom certificates.
#
# ca cert from install /etc/ssl/certs/ca-certificates.crt
#
# openssl dsaparam -out dsa.params 2048
# openssl gendsa -out dsa.key dsa.params
# openssl dsa -in dsa.key -pubout -out dsa.cert
#
# snakeoil pulled from install.
#
# Tests:
# * vsftpd.d/ options are deployed correctly.
# * Standard service override works correctly (service running).


dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        vsftpd_srv_banner: 'test banner'
        vsftpd_cfg_deny_email_enable: true
        vsftpd_srv_banned_emails:
          - 'test@example.com'
          - 'test2@example.com'
        vsftpd_cfg_secure_email_list_enable: true
        vsftpd_srv_email_passwords:
          - 'test_password'
          - 'test_password2'
        vsftpd_cfg_chroot_list_enable: true
        vsftpd_srv_chroot_list:
          - 'chroot_user'
          - 'chroot_user2'
        vsftpd_cfg_userlist_enable: true
        vsftpd_srv_userlist:
          - 'user1'
          - 'user2'
        vsftpd_srv_secure_d: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/molecule/cache"
          }}'
        vsftpd_cfg_ca_certs_file: '/etc/vsftpd.d/secure.d/ca.pem'
        vsftpd_cfg_dsa_cert_file: '/etc/vsftpd.d/secure.d/dsa.cert'
        vsftpd_cfg_dsa_private_key_file: '/etc/vsftpd.d/secure.d/dsakey.pem'
        vsftpd_cfg_rsa_cert_file:
          '/etc/vsftpd.d/secure.d/ssl-cert-snakeoil.pem'
        vsftpd_cfg_rsa_private_key_file:
          '/etc/vsftpd.d/secure.d/ssl-cert-snakeoil.key'
        vsftpd_srv_user_d: '/etc/vsftpd.d/secure.d/user_config'
platforms:
  - name: 'vsftpd-certs'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
