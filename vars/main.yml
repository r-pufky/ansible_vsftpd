---
###############################################################################
# VSFTPd Role Options
###############################################################################
#
# Updates:
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://manpages.debian.org/trixie/vsftpd/vsftpd.conf.5.en.html
# * https://security.appspot.com/vsftpd.html

vsftpd___release: "{{ {} | r_pufky.data.v3(


    _date='2026-04-05',
    _debian='trixie',
    _app='3.0.5-0.2',
  ) }}"

vsftpd___service_dir: '/etc/vsftpd.d'
vsftpd___pam_dir: '/etc/pam.d'

###############################################################################
# APT Packages
###############################################################################

vsftpd___packages:
  - 'vsftpd'
  - 'ssl-cert'  # CA certificates.

vsftpd___virtual_user_packages:
  - 'python3-passlib'  # md5_crypt for community.general.htpasswd.
  - 'libpam-pwdfile'  # pam_pwdfile.so for virtual_users.

###############################################################################
# VSFTPd
###############################################################################

vsftpd___app: "{{ {} | r_pufky.data.v3(

    _cfg='/etc/vsftpd.conf',
    _etc_d='/etc/vsftpd.d',
    _virtual_users='/etc/vsftpd.d/virtual_users',
    _banned_emails='/etc/vsftpd.d/banned_emails',
    _banner='/etc/vsftpd.d/banner',
    _chroot_list='/etc/vsftpd.d/chroot_list',
    _email_passwords='/etc/vsftpd.d/email_passwords',
    _user_list='/etc/vsftpd.d/user_list',

    _secure_d='/etc/vsftpd.d/secure.d',
    _user_d='/etc/vsftpd.d/user.d',
    _pam_d='/etc/pam.d',
    _virtual_pam='/etc/pam.d/vsftpd_virtual',

    _log='/var/log/vsftpd.log',
    _xfer_log='/var/log/xferlog',
    _drop_in='/etc/systemd/system/vsftpd.service.d/override.conf',
  ) }}"

###############################################################################
# Default User/Group
###############################################################################

vsftpd___group:
  name: 'ftp'
  gid: 666

vsftpd___user:
  name: 'ftp'
  group: 'ftp'
  uid: 666
  shell: '/usr/sbin/nologin'
  home: '/srv/ftp'
  comment: 'ftp daemon,,,'
  create_home: true
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
